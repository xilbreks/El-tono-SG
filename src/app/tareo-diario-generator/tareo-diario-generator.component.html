<h3>
  Generador de Tareos (RDT) LTS
</h3>

<div>
  <b>DATOS:</b>
  <ul>
    <li>Fecha: {{fcFecha.value}}</li>
  </ul>
</div>

<div>
  @if (!generando) {
    <button class="btn btn-primary" (click)="generarTareo()">
      Generar RDT
    </button>
  }

  @if (generando) {
    <button class="btn btn-primary">
      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
      Generando...
    </button>
  }
</div>

<div>
  <p>
    Listado de colaboradores que deben realizar su RDT:
  </p>
  <ol>
    @for (usuario of usuarios; track usuario) {
      <li>
        {{usuario.snombre}}: [{{usuario.id}}]
      </li>
    }
  </ol>
  @if (cargando) {
    <div>
      <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
    </div>
  }
</div>
